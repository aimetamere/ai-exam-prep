# Cloudflare — static Vite app
#
# ── Cloudflare PAGES (recommended for this repo) ───────────────────────────
# In the Pages project → Settings → Builds:
#   Build command:          npm run build
#   Build output directory: frontend/dist
#   Root directory:         /   (repo root)
# Leave "Deploy command" EMPTY — Pages uploads frontend/dist automatically.
# Do NOT paste `npx wrangler pages deploy ...` into the build command.
#
# ── CLI (manual deploy) ─────────────────────────────────────────────────────
#   npm run build && npx wrangler pages deploy frontend/dist --project-name=YOUR_PROJECT
#
# ── If your host runs `npx wrangler deploy` after build (Workers-style) ────
# Do NOT use frontend/public/_redirects with a `/* → /index.html` rule here — Workers
# validates that as an infinite loop. Use `not_found_handling` below instead.

name = "ai-exam-prep"
compatibility_date = "2025-01-01"
main = "worker/index.ts"
pages_build_output_dir = "./frontend/dist"

[assets]
directory = "./frontend/dist"
# SPA fallback for client-side routes (replaces Pages-style _redirects)
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "ai-exam-prep-db"
database_id = "ff34a14f-f225-4a9e-98ba-e6cc84bc0b09"
